<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle}">Auth</title>

    <!-- Tailwind CSS 3 (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* helper to keep the page visually centered */
        html, body { height: 100%; }
    </style>
</head>
<body class="antialiased bg-gray-50">

<div class="flex items-center justify-center min-h-screen p-6">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden max-w-5xl w-full grid grid-cols-1 md:grid-cols-2">

        <!-- LEFT: Illustration -->
        <div class="hidden md:flex items-center justify-center" style="background-color: #005AE6;">
            <img th:src="@{/images/illustration.svg}" alt="Member's illustration" class="w-full h-auto object-cover">
        </div>

        <!-- RIGHT: Content -->
        <div class="p-10 md:p-12 lg:p-16">
            <div layout:fragment="content">
                <!-- Page content will be inserted here -->
            </div>
        </div>

    </div>
</div>

</body>
</html>
