<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth}"
      lang="en">
<head>
    <title>Register</title>
</head>
<body>

<div layout:fragment="content">
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Create an account</h1>
        <p class="text-sm text-gray-500 mt-1">Join our member portal today</p>
    </div>

    <!-- Registration Form -->
    <form th:action="@{/register}" th:object="${member}" method="post" class="space-y-4">
        <!-- Error Summary Alert -->
        <div th:replace="~{fragments/forms :: error-summary}"></div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- First Name -->
        <div>
            <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">First name</label>
            <input type="text"
                   id="firstName"
                   th:field="*{firstName}"
                   placeholder="Enter your first name"
                   required
                   th:classappend="${#fields.hasErrors('firstName')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <p th:if="${#fields.hasErrors('firstName')}"
               th:errors="*{firstName}"
               class="mt-1 text-sm text-red-600"></p>
        </div>

        <!-- Last Name -->
        <div>
            <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">Last name</label>
            <input type="text"
                   id="lastName"
                   th:field="*{lastName}"
                   placeholder="Enter your last name"
                   required
                   th:classappend="${#fields.hasErrors('lastName')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <p th:if="${#fields.hasErrors('lastName')}"
               th:errors="*{lastName}"
               class="mt-1 text-sm text-red-600"></p>
        </div>

        <!-- Email -->
        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
            <input type="email"
                   id="email"
                   th:field="*{email}"
                   placeholder="you@example.com"
                   required
                   th:classappend="${#fields.hasErrors('email')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <p th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}"
               class="mt-1 text-sm text-red-600"></p>
        </div>

        <!-- Password -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password"
                   id="password"
                   th:field="*{password}"
                   placeholder="••••••••"
                   required
                   th:classappend="${#fields.hasErrors('password')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <p th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}"
               class="mt-1 text-sm text-red-600"></p>
        </div>

        <!-- Date of Birth -->
        <div>
            <label for="dateOfBirth" class="block text-sm font-medium text-gray-700 mb-2">Date of birth</label>
            <input type="date"
                   id="dateOfBirth"
                   th:field="*{dateOfBirth}"
                   required
                   th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
            <p th:if="${#fields.hasErrors('dateOfBirth')}"
               th:errors="*{dateOfBirth}"
               class="mt-1 text-sm text-red-600"></p>
        </div>

        <!-- Plan -->
        <div>
            <label for="planName" class="block text-sm font-medium text-gray-700 mb-2">Plan</label>
            <select id="planName"
                    th:field="*{planName}"
                    required
                    th:classappend="${#fields.hasErrors('planName')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                    class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <option value="" disabled selected>Select a plan</option>
                <option th:each="p : ${T(com.nzuwera.membership.domain.PlanType).values()}"
                        th:value="${p}"
                        th:text="${p}"></option>
            </select>
            <p th:if="${#fields.hasErrors('planName')}"
               th:errors="*{planName}"
               class="mt-1 text-sm text-red-600"></p>
        </div>

        <!-- Hidden fields for role and status -->
        <input type="hidden" th:field="*{role}" value="USER"/>
        <input type="hidden" th:field="*{status}" value="ACTIVE"/>

        <!-- Submit Button -->
        <div class="pt-2">
            <button type="submit"
                    class="w-full inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 text-white px-4 py-3 font-medium shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                </svg>
                Create account
            </button>
        </div>

        <!-- Back to Login Link -->
        <div class="text-center text-sm text-gray-600">
            Already have an account? <a th:href="@{/login}" class="text-blue-600 font-medium hover:underline">Sign in</a>
        </div>
    </form>

    <div class="mt-8 text-xs text-gray-400">
        By registering, you agree to our <a href="#" class="underline">Terms</a> and <a href="#" class="underline">Privacy Policy</a>.
    </div>
</div>

</body>
</html>
