<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/auth}"
      lang="en">
<head>
    <title>Login</title>
</head>
<body>

<div layout:fragment="content">
    <!-- Logout Success Message -->
    <div th:if="${param.logout}" class="mb-6 p-4 rounded-lg bg-green-50 border border-green-200">
        <p class="text-sm text-green-800 font-medium">You have been successfully logged out.</p>
    </div>

    <!-- Social Login Buttons -->
    <div th:replace="~{fragments/forms :: social-login}"></div>

    <!-- Divider -->
    <div th:replace="~{fragments/forms :: divider('or sign in with')}"></div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post" class="space-y-5">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Username Field -->
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
            <input type="text"
                   id="username"
                   name="username"
                   placeholder="username or email"
                   required
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- Password Field -->
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password"
                   id="password"
                   name="password"
                   placeholder="••••••••"
                   required
                   class="w-full rounded-lg border border-gray-200 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between text-sm text-gray-600">
            <label class="inline-flex items-center space-x-2">
                <input type="checkbox"
                       id="remember_me"
                       name="remember-me"
                       value="true"
                       class="rounded text-blue-600 focus:ring-blue-500">
                <span>Remember me</span>
            </label>
            <a href="#" class="hover:underline">Forgot password?</a>
        </div>

        <!-- Submit Button -->
        <div>
            <button type="submit"
                    class="w-full inline-flex items-center justify-center gap-2 rounded-lg bg-blue-600 text-white px-4 py-3 font-medium shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Sign in
            </button>
        </div>

        <!-- Sign Up Link -->
        <div class="text-center text-sm text-gray-600">
            Don't have an account? <a th:href="@{/register}" class="text-blue-600 font-medium hover:underline">Create one</a>
        </div>
    </form>

    <div class="mt-8 text-xs text-gray-400">
        By continuing, you agree to our <a href="#" class="underline">Terms</a> and <a href="#" class="underline">Privacy Policy</a>.
    </div>
</div>

</body>
</html>
