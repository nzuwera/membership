<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login</title>

    <!-- Bootstrap 5.3.7 CSS -->
    <link th:href="@{/webjars/bootstrap/5.3.7/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">


    <!-- Custom styles -->
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body class="bg-light">

<div class="container py-5">
    <!-- Login 5 - Bootstrap Brain Component -->
    <section class="p-3 p-md-4 p-xl-5">
        <div class="container">
            <div class="card border-light-subtle shadow-sm">
                <div class="row g-0">
                    <div class="col-lg-6 col-xl-7 col-xxl-6 position-relative overflow-hidden bg-dark d-none d-lg-block bg-primary-blue">
                        <div class="d-flex align-items-center justify-content-center">
                            <img class="img-fluid" loading="lazy" th:src="@{/images/illustration.svg}"
                                 alt="Member's illustration">
                        </div>
                    </div>
                    <div class="col-lg-6 col-xl-5 col-xxl-6">
                        <div class="min-vh-100 bg-body row justify-content-center justify-content-lg-start align-items-center p-5">
                            <h2 class="fs-7 fw-bolder">Log in</h2>
                            <p class="mb-4">Your Member Portal</p>
                            <div class="row">
                                <div class="col-6">
                                    <a class="btn btn-link border border-muted d-flex align-items-center justify-content-center rounded-2 py-8 text-decoration-none" href="javascript:void(0)" role="button">
                                        <img th:src="@{/images/google.svg}" alt="MaterialM-img" class="img-fluid me-2" width="18" height="18">
                                        Google
                                    </a>
                                </div>
                                <div class="col-6">
                                    <a class="btn btn-link border border-muted d-flex align-items-center justify-content-center rounded-2 py-8 text-decoration-none" href="javascript:void(0)" role="button">
                                        <img th:src="@{/images/microsoft.svg}" alt="MaterialM-img" class="img-fluid me-2" width="18" height="18">
                                        Microsoft
                                    </a>
                                </div>
                            </div>
                            <div class="position-relative text-center my-4">
                                <p class="mb-0 fs-4 px-3 d-inline-block bg-body text-dark z-index-5 position-relative">
                                    or sign in with
                                </p>
                                <span class="border-top w-100 position-absolute top-50 start-50 translate-middle"></span>
                            </div>
                            <form th:action="@{/login}" method="post" class="w-100">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <div class="form-floating mb-3">
                                        <input type="text" class="form-control" id="username" name="username"
                                               placeholder="username or email" required>
                                        <label for="username">Username</label>
                                    </div>
                                </div>
                                <div class="mb-4">
                                    <div class="form-floating">
                                        <input type="password" class="form-control" id="password" name="password"
                                               placeholder="Password" required>
                                        <label for="password">Password</label>
                                    </div>
                                </div>
                                <div class="d-flex align-items-center justify-content-between mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" value="true" name="remember-me"
                                               id="remember_me">
                                        <label class="form-check-label text-secondary" for="remember_me">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="#" class="link-secondary text-decoration-none">Forgot password</a>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 py-2 mb-2 rounded-2">Sign In</button>
                                <div class="d-flex align-items-center justify-content-center">
                                    <p class="fs-6 mb-0">New here?</p>
                                    <a class="text-primary ms-2" th:href="@{/register}">Create an account</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<script>
    document.querySelectorAll('#togglePassword').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = btn.closest('form').querySelector('#password');
            if (!input) return;
            input.type = input.type === 'password' ? 'text' : 'password';
        });
    });
</script>

<!-- Bootstrap JS bundle (includes Popper) -->
<script th:src="@{/webjars/bootstrap/5.3.7/js/bootstrap.bundle.min.js}" defer></script>

</body>
</html>
