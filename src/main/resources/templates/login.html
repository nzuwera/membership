<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login</title>

    <!-- Bootstrap 5.3.8 CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Custom styles -->
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body class="bg-light">
<div class="container vh-100">
    <div class="card border-0 shadow-sm overflow-hidden">
        <div class="row g-0">
            <!-- Illustration -->
            <div class="col-6 bg-dark d-none d-md-block bg-primary-blue">
                <div class="d-flex align-items-center justify-content-center">
                    <img class="img-fluid" loading="lazy" th:src="@{/images/illustration.svg}"
                         alt="Member's illustration">
                </div>
            </div>
            <div class="col-6 d-flex align-items-center justify-content-around vh-100">
                <div class="card-body w-75">
                    <h2 class="card-title">Login</h2>
                    <p class="card-text text-secondary mb-4">Join the Member Portal</p>
                    <form th:action="@{/login}" method="post" class="w-100 mb-1">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="username" name="username"
                                       placeholder="email" required>
                                <label for="username">Email</label>
                            </div>
                        </div>
                        <div class="mb-4">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Password" required>
                                <label for="password">Password</label>
                            </div>
                        </div>
                        <div class="d-flex align-items-center justify-content-between mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="true" name="remember-me"
                                       id="remember_me">
                                <label class="form-check-label text-secondary" for="remember_me">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="link-secondary text-decoration-none">Forgot password</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 mb-2 rounded-2">Sign In</button>
                    </form>
                    <div class="w-100 mx-auto">
                        <p class="fs-6 mb-0">Don't have an account? <a class="text-primary ms-2" th:href="@{/register}">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('#togglePassword').forEach(btn => {
        btn.addEventListener('click', () => {
            const input = btn.closest('form').querySelector('#password');
            if (!input) return;
            input.type = input.type === 'password' ? 'text' : 'password';
        });
    });
</script>

<!-- Bootstrap JS bundle (includes Popper) via CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" defer></script>

</body>
</html>
