<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <h3 class="mb-3">Edit Member</h3>
    <form th:action="@{'/members/' + ${member.email}}" th:object="${member}" method="post" class="row g-3">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="col-md-6">
            <label class="form-label">First name</label>
            <input type="text" class="form-control" th:field="*{firstName}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Last name</label>
            <input type="text" class="form-control" th:field="*{lastName}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Date of birth</label>
            <input type="date" class="form-control" th:field="*{dateOfBirth}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Plan</label>
            <select class="form-select" th:field="*{planName}">
                <option value="BRONZE">BRONZE</option>
                <option value="SILVER">SILVER</option>
                <option value="GOLD">GOLD</option>
            </select>
        </div>
        <div class="col-12">
            <button class="btn btn-primary" type="submit">Update</button>
            <a class="btn btn-secondary" th:href="@{/members}">Back</a>
        </div>
    </form>
</div>
</body>
</html>
