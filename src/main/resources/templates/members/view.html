<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}"
      lang="en">
<head>
    <title>View Member</title>
</head>
<body>

<div layout:fragment="content">
    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-2xl font-bold text-gray-900">Member Details</h3>
            <div class="flex space-x-3">
                <a th:href="@{'/members/' + ${member.email} + '/edit'}"
                   class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Edit
                </a>
            </div>
        </div>

        <!-- Member Details -->
        <div class="px-6 py-6">
            <dl class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-6">
                <!-- First Name -->
                <div class="border-b border-gray-200 pb-4">
                    <dt class="text-sm font-medium text-gray-500 mb-1">First name</dt>
                    <dd class="text-base text-gray-900" th:text="${member.firstName}">John</dd>
                </div>

                <!-- Last Name -->
                <div class="border-b border-gray-200 pb-4">
                    <dt class="text-sm font-medium text-gray-500 mb-1">Last name</dt>
                    <dd class="text-base text-gray-900" th:text="${member.lastName}">Doe</dd>
                </div>

                <!-- Email -->
                <div class="border-b border-gray-200 pb-4">
                    <dt class="text-sm font-medium text-gray-500 mb-1">Email</dt>
                    <dd class="text-base text-gray-900" th:text="${member.email}">john@example.com</dd>
                </div>

                <!-- Date of Birth -->
                <div class="border-b border-gray-200 pb-4">
                    <dt class="text-sm font-medium text-gray-500 mb-1">Date of birth</dt>
                    <dd class="text-base text-gray-900" th:text="${#temporals.format(member.dateOfBirth, 'MMM dd, yyyy')}">Jan 01, 1990</dd>
                </div>

                <!-- Plan -->
                <div class="border-b border-gray-200 pb-4">
                    <dt class="text-sm font-medium text-gray-500 mb-1">Plan</dt>
                    <dd class="text-base text-gray-900">
                        <span th:text="${member.planName}"
                              class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium"
                              th:classappend="${member.planName == 'UNLIMITED' ? 'bg-yellow-100 text-yellow-800' :
                                                member.planName == 'SILVER' ? 'bg-gray-100 text-gray-800' :
                                                'bg-orange-100 text-orange-800'}">
                            BRONZE
                        </span>
                    </dd>
                </div>
            </dl>

            <!-- Action Buttons -->
            <div class="mt-8 flex items-center justify-start space-x-4 pt-6 border-t border-gray-200">
                <a th:href="@{/members}"
                   class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Back to List
                </a>
                <form th:action="@{'/members/' + ${member.email} + '/delete'}" method="post" class="inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit"
                            onclick="return confirm('Are you sure you want to delete this member?')"
                            class="inline-flex items-center px-4 py-2 border border-red-300 text-sm font-medium rounded-md text-red-700 bg-white hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                        Delete Member
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
