<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Member Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #343a40; color: #fff; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link.active, .sidebar .nav-link:hover { color: #fff; background-color: rgba(13,110,253,.2); }
        .sidebar .header { font-weight: 700; font-size: 1.1rem; padding: 1rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,.1); }
        .content-header { background-color: #ffffff; border-bottom: 1px solid #dee2e6; }
        .table thead th { background-color: #343a40; color: #fff; }
        .table-striped>tbody>tr:nth-of-type(odd)>* { background-color: rgba(0,0,0,.02); }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <nav class="col-12 col-md-3 col-lg-2 sidebar d-flex flex-column p-0">
            <div class="header text-center">Member Management</div>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Dashboard</a></li>
                <li><a class="nav-link" th:href="@{/members}">Users</a></li>
                <li><a class="nav-link" th:href="@{/profile}">Profile</a></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="p-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-light w-100">Logout</button>
                    </form>
                </li>
            </ul>
            <div class="mt-auto small text-center p-3">&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> Membership</div>
        </nav>

        <!-- Main content -->
        <main class="col-12 col-md-9 col-lg-10 ms-sm-auto px-4">
            <!-- Header -->
            <div class="content-header d-flex align-items-center justify-content-between py-3">
                <h5 class="mb-0 text-dark">Dashboard</h5>
                <div class="d-flex gap-2">
                    <form class="d-none d-md-flex" role="search">
                        <input class="form-control form-control-sm" type="search" placeholder="Search users..." aria-label="Search">
                    </form>
                    <a class="btn btn-primary btn-sm" th:href="@{/members/new}">Add User</a>
                </div>
            </div>

            <!-- Users table -->
            <div class="card my-3 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped align-middle mb-0">
                            <thead>
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">Email</th>
                                <th scope="col">Plan type</th>
                                <th scope="col">Status</th>
                                <th scope="col" class="text-end">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="m : ${members}">
                                <td>
                                    <div class="fw-semibold" th:text="${m.firstName + ' ' + m.lastName}"></div>
                                </td>
                                <td>
                                    <a th:href="@{'/members/' + ${m.email}}" th:text="${m.email}"></a>
                                </td>
                                <td th:text="${m.planName}"></td>
                                <td>
                                    <span class="badge" th:classappend="${m.status == 'ACTIVE'} ? ' bg-success' : ' bg-secondary'" th:text="${m.status}"></span>
                                </td>
                                <td class="text-end">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/members/' + ${m.email}}">View</a>
                                    <a class="btn btn-sm btn-outline-secondary" th:href="@{'/members/' + ${m.email}}">Edit</a>
                                    <form th:action="@{'/members/' + ${m.email} + '/delete'}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
