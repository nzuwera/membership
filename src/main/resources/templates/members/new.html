<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>New Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light" style="font-family: Nunito, sans-serif;">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="mb-0">Create Member</h3>
        <a class="btn btn-outline-secondary" th:href="@{/members}">Back</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/members}" th:object="${member}" method="post" class="row g-3">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="col-md-6">
                    <label class="form-label">First name</label>
                    <input type="text" class="form-control" th:field="*{firstName}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last name</label>
                    <input type="text" class="form-control" th:field="*{lastName}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Date of birth</label>
                    <input type="date" class="form-control" th:field="*{dateOfBirth}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Plan</label>
                    <select class="form-select" th:field="*{planName}" required>
                        <option th:each="p : ${T(com.nzuwera.membership.domain.PlanType).values()}"
                                th:value="${p}" th:text="${p}"></option>
                    </select>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button class="btn btn-primary" type="submit">Save</button>
                    <a class="btn btn-secondary" th:href="@{/members}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
