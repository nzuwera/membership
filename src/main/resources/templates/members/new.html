<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}"
      lang="en">
<head>
    <title th:text="${member.email != null ? 'Edit Member' : 'New Member'}">Member</title>
</head>
<body>

<div layout:fragment="content">
    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-200">
            <h3 class="text-2xl font-bold text-gray-900" th:text="${member.email != null ? 'Edit Member' : 'Create Member'}">Create Member</h3>
        </div>

        <!-- Form -->
        <div class="px-6 py-6">

            <form th:action="${member.email != null ? '/members/' + member.email + '/edit' : '/members'}"
                  th:object="${member}"
                  method="post">
                <!-- Error Summary Alert -->
                <div th:replace="~{fragments/forms :: error-summary}"></div>

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- First Name -->
                    <div>
                        <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">
                            First name
                        </label>
                        <input type="text"
                               id="firstName"
                               th:field="*{firstName}"
                               required
                               th:classappend="${#fields.hasErrors('firstName')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <p th:if="${#fields.hasErrors('firstName')}"
                           th:errors="*{firstName}"
                           class="mt-1 text-sm text-red-600"></p>
                    </div>

                    <!-- Last Name -->
                    <div>
                        <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">
                            Last name
                        </label>
                        <input type="text"
                               id="lastName"
                               th:field="*{lastName}"
                               required
                               th:classappend="${#fields.hasErrors('lastName')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <p th:if="${#fields.hasErrors('lastName')}"
                           th:errors="*{lastName}"
                           class="mt-1 text-sm text-red-600"></p>
                    </div>

                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email
                        </label>
                        <input type="email"
                               id="email"
                               th:field="*{email}"
                               required
                               th:classappend="${#fields.hasErrors('email')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <p th:if="${#fields.hasErrors('email')}"
                           th:errors="*{email}"
                           class="mt-1 text-sm text-red-600"></p>
                    </div>

                    <!-- Date of Birth -->
                    <div>
                        <label for="dateOfBirth" class="block text-sm font-medium text-gray-700 mb-2">
                            Date of birth
                        </label>
                        <input type="date"
                               id="dateOfBirth"
                               th:field="*{dateOfBirth}"
                               required
                               th:classappend="${#fields.hasErrors('dateOfBirth')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                        <p th:if="${#fields.hasErrors('dateOfBirth')}"
                           th:errors="*{dateOfBirth}"
                           class="mt-1 text-sm text-red-600"></p>
                    </div>

                    <!-- Plan -->
                    <div>
                        <label for="planName" class="block text-sm font-medium text-gray-700 mb-2">
                            Plan
                        </label>
                        <select id="planName"
                                th:field="*{planName}"
                                required
                                th:classappend="${#fields.hasErrors('planName')} ? 'border-red-500 ring-1 ring-red-500' : ''"
                                class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                            <option th:each="p : ${T(com.nzuwera.membership.domain.PlanType).values()}"
                                    th:value="${p}"
                                    th:text="${p}"></option>
                        </select>
                        <p th:if="${#fields.hasErrors('planName')}"
                           th:errors="*{planName}"
                           class="mt-1 text-sm text-red-600"></p>
                    </div>
                </div>

                <!-- Buttons -->
                <div class="mt-6 flex items-center justify-start space-x-4">
                    <button type="submit"
                            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        <span th:text="${member.email != null ? 'Update' : 'Save'}">Save</span>
                    </button>
                    <a th:href="@{/members}"
                       class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
