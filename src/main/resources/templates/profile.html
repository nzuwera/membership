<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}"
      lang="en">
<head>
    <title>My Profile</title>
</head>
<body>

<div layout:fragment="content">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-6">My Profile</h1>

        <!-- Success Message -->
        <div th:if="${message}"
             role="alert"
             aria-live="polite"
             id="successAlert"
             class="mb-6 bg-green-50 border border-green-200 text-green-800 px-4 py-3 rounded-lg relative">
            <button onclick="document.getElementById('successAlert').remove()"
                    class="absolute top-2 right-2 text-green-600 hover:text-green-800 font-bold text-xl leading-none"
                    aria-label="Close alert">
                ×
            </button>
            <p th:text="${message}" class="pr-8"></p>
        </div>

        <!-- Error Message -->
        <div th:if="${error}"
             role="alert"
             aria-live="polite"
             id="errorAlert"
             class="mb-6 bg-red-50 border border-red-200 text-red-800 px-4 py-3 rounded-lg relative">
            <button onclick="document.getElementById('errorAlert').remove()"
                    class="absolute top-2 right-2 text-green-600 hover:text-green-800 font-bold text-xl leading-none"
                    aria-label="Close alert">
                ×
            </button>
            <p th:text="${error}" class="pr-8"></p>
        </div>

        <!-- Personal Information Section -->
        <div class="bg-white shadow-md rounded-lg overflow-hidden mb-6">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-900">Personal Information</h2>
                <p class="text-sm text-gray-500 mt-1">Update your personal details and contact information</p>
            </div>

            <div class="px-6 py-6">
                <form th:action="@{/members/profile/{username}(username=${#authentication.name})}" method="post" id="profileInfoForm" th:object="${profileInfo}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- First Name -->
                        <div>
                            <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">
                                First Name <span class="text-red-500">*</span>
                            </label>
                            <input type="text"
                                   id="firstName"
                                   name="firstName"
                                   th:field="*{firstName}"
                                   required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p th:if="${#fields.hasErrors('firstName')}"
                               th:errors="*{firstName}"
                               class="mt-1 text-sm text-red-600"></p>
                        </div>

                        <!-- Last Name -->
                        <div>
                            <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">
                                Last Name <span class="text-red-500">*</span>
                            </label>
                            <input type="text"
                                   id="lastName"
                                   name="lastName"
                                   th:field="*{lastName}"
                                   required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p th:if="${#fields.hasErrors('lastName')}"
                               th:errors="*{lastName}"
                               class="mt-1 text-sm text-red-600"></p>
                        </div>

                        <!-- Email (Read-only) -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                                Email Address
                            </label>
                            <input type="email"
                                   id="email"
                                   th:field="*{email}"
                                   readonly
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md bg-gray-100 text-gray-600 cursor-not-allowed">
                            <p class="mt-1 text-xs text-gray-500">Email cannot be changed</p>
                        </div>

                        <!-- Date of Birth -->
                        <div>
                            <label for="dateOfBirth" class="block text-sm font-medium text-gray-700 mb-2">
                                Date of Birth <span class="text-red-500">*</span>
                            </label>
                            <input type="date"
                                   id="dateOfBirth"
                                   name="dateOfBirth"
                                   th:field="*{dateOfBirth}"
                                   required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p th:if="${#fields.hasErrors('dateOfBirth')}"
                               th:errors="*{dateOfBirth}"
                               class="mt-1 text-sm text-red-600"></p>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-end">
                        <button type="submit"
                                class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Security Section -->
        <div class="bg-white shadow-md rounded-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-900">Security</h2>
                <p class="text-sm text-gray-500 mt-1">Manage your password and account security</p>
            </div>

            <div class="px-6 py-6">
                <form th:action="@{/members/profile/{username}/change-password(username=${#authentication.name})}" method="post" id="passwordForm" th:object="${passwordInfo}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="space-y-6">
                        <!-- Current Password -->
                        <div>
                            <label for="oldPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                Current Password <span class="text-red-500">*</span>
                            </label>
                            <input type="password"
                                   id="oldPassword"
                                   name="oldPassword"
                                   th:field="*{oldPassword}"
                                   required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>

                        <!-- New Password -->
                        <div>
                            <label for="newPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                New Password <span class="text-red-500">*</span>
                            </label>
                            <input type="password"
                                   id="newPassword"
                                   name="newPassword"
                                   th:field="*{newPassword}"
                                   required
                                   minlength="8"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                            <p class="mt-1 text-xs text-gray-500">Password must be at least 8 characters long</p>
                        </div>

                        <!-- Confirm New Password -->
                        <div>
                            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">
                                Confirm New Password <span class="text-red-500">*</span>
                            </label>
                            <input type="password"
                                   id="confirmPassword"
                                   name="confirmPassword"
                                   required
                                   minlength="8"
                                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                    </div>

                    <div class="mt-6 flex justify-end">
                        <button type="submit"
                                class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                            Change Password
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Password Match Validation Script -->
<script layout:fragment="scripts">
    document.getElementById('passwordForm').addEventListener('submit', function (e) {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            e.preventDefault();
            alert('New password and confirm password do not match!');
            return false;
        }
    });
</script>

</body>
</html>
