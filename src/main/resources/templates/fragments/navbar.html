<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity5"
      lang="en">
<body>

<!-- Dark Mode Navbar -->
<nav th:fragment="navbar" class="bg-gray-900 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <a href="#" class="flex-shrink-0 flex items-center">
                    <span class="ml-2 text-xl font-bold">Member Portal</span>
                </a>
                <!-- Desktop Navigation -->
                <div class="hidden md:ml-6 md:flex md:space-x-8" id="nav-links">
                    <a th:href="@{/home}"
                       th:classappend="${#strings.equals(activeNav, 'home') ? 'text-white border-b-2 border-indigo-500' : 'text-gray-300 hover:text-white border-b-2 border-transparent hover:border-gray-300'}"
                       class="px-1 pt-1 inline-flex items-center text-sm font-medium">
                        Dashboard
                    </a>
                    <a th:href="@{/members}"
                       th:classappend="${#strings.equals(activeNav, 'members') ? 'text-white border-b-2 border-indigo-500' : 'text-gray-300 hover:text-white border-b-2 border-transparent hover:border-gray-300'}"
                       class="px-1 pt-1 inline-flex items-center text-sm font-medium">
                        Team
                    </a>
                </div>
            </div>
            <div class="flex items-center">
                <!-- Profile dropdown -->
                <div class="ml-3 relative hidden md:block">
                    <button type="button"
                            class="bg-transparent flex text-sm rounded-full focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-white"
                            id="user-menu-button" aria-expanded="false" aria-haspopup="true">
                        <span class="sr-only">Open user menu</span>
                        <span class="text-white font-bold" sec:authentication="name">User Name</span>

                    </button>

                    <!-- Dropdown menu -->
                    <div class="origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg py-1 bg-white ring-1 ring-black ring-opacity-5 focus:outline-none hidden"
                         id="user-menu" role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button"
                         tabindex="-1">
                        <a th:href="@{/members/profile/{username}(username=${#authentication.name})}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                           role="menuitem" tabindex="-1">Your Profile</a>
                        <form th:action="@{/logout}" method="post" class="block">
                            <button type="submit"
                                    class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
                                    role="menuitem" tabindex="-1">
                                Sign out
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Mobile menu button -->
                <button type="button"
                        class="md:hidden ml-4 inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-white"
                        aria-expanded="false" id="mobile-menu-button">
                    <span class="sr-only">Open main menu</span>
                    <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile menu -->
    <div class="md:hidden hidden" id="mobile-menu">
        <div class="px-2 pt-2 pb-3 space-y-1">
            <a th:href="@{/home}"
               th:classappend="${#strings.equals(activeNav, 'home') ? 'bg-gray-800 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block px-3 py-2 rounded-md text-base font-medium">Dashboard</a>
            <a th:href="@{/members}"
               th:classappend="${#strings.equals(activeNav, 'members') ? 'bg-gray-800 text-white' : 'text-gray-300 hover:bg-gray-700 hover:text-white'}"
               class="block px-3 py-2 rounded-md text-base font-medium">Team</a>
        </div>

        <!-- Mobile profile -->
        <div class="pt-4 pb-3 border-t border-gray-700">
            <div class="flex items-center px-5">
                <img class="h-10 w-10 rounded-full flex-shrink-0"
                     src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-1.2.1&ixid=eyJhcHBfaWQiOjEyMDd9&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                     alt="">
                <div class="ml-3">
                    <div class="text-base font-medium text-white">Tom Cook</div>
                    <div class="text-sm font-medium text-gray-400">tom@example.com</div>
                </div>
            </div>
            <div class="mt-3 px-2 space-y-1">
                <a th:href="@{/members/profile/{username}(username=${#authentication.name})}"
                   class="block px-3 py-2 rounded-md text-base font-medium text-gray-400 hover:text-white hover:bg-gray-700">Your
                    Profile</a>
                <form th:action="@{/logout}" method="post">
                    <button type="submit"
                            class="w-full text-left px-3 py-2 rounded-md text-base font-medium text-gray-400 hover:text-white hover:bg-gray-700">
                        Sign out
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<!-- Navbar Scripts Fragment -->
<script th:fragment="navbar-scripts">
    // Mobile menu toggle
    document.getElementById('mobile-menu-button').addEventListener('click', function () {
        const mobileMenu = document.getElementById('mobile-menu');
        const isExpanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !isExpanded);
        mobileMenu.classList.toggle('hidden');
    });

    // User menu toggle
    document.getElementById('user-menu-button')?.addEventListener('click', function () {
        const userMenu = document.getElementById('user-menu');
        const isExpanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !isExpanded);
        userMenu.classList.toggle('hidden');
    });
</script>

</body>
</html>
